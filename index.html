<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Mic Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #007AFF;
            --danger: #FF3B30;
            --bg: #f2f2f7;
            --card: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }
        h1 { font-size: 1.4rem; margin: 0 0 0.5rem 0; color: #1c1c1e; }
        
        /* Visualizer Bar */
        #visualizer {
            width: 100%;
            height: 12px;
            background: #e5e5ea;
            border-radius: 6px;
            margin: 1.5rem 0;
            overflow: hidden;
        }
        #bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.05s ease;
        }

        /* Volume Slider */
        .slider-container { margin: 1rem 0; text-align: left; }
        input[type=range] { width: 100%; margin-top: 8px; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        #startBtn { background-color: var(--primary); color: white; }
        #stopBtn { background-color: #f2f2f7; color: var(--danger); display: none; }
        
        /* QR Section */
        .qr-section {
            margin-top: 2rem;
            padding: 1rem;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #qrcode { padding: 10px; background: white; }
        .qr-label { font-size: 0.75rem; color: #8e8e93; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pocket Mic</h1>
    
    <div id="visualizer"><div id="bar"></div></div>
    
    <div class="slider-container">
        <label style="font-size: 0.8rem; font-weight: bold; color: #444;">MIC GAIN</label>
        <input type="range" id="gainSlider" min="0" max="2" step="0.1" value="1">
    </div>

    <button id="startBtn" class="btn">Start Session</button>
    <button id="stopBtn" class="btn">End Session</button>

    <div class="qr-section">
        <div id="qrcode"></div>
        <div class="qr-label">Scan to share this Mic Link</div>
    </div>
</div>

<script>
    let audioCtx, micSource, analyzer, gainNode, animationId;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const bar = document.getElementById('bar');
    const gainSlider = document.getElementById('gainSlider');

    // Generate QR Code for current URL
    new QRCode(document.getElementById("qrcode"), {
        text: window.location.href,
        width: 128,
        height: 128,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    startBtn.addEventListener('click', async () => {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false } 
            });

            micSource = audioCtx.createMediaStreamSource(stream);
            analyzer = audioCtx.createAnalyser();
            gainNode = audioCtx.createGain();
            
            // Set initial volume
            gainNode.gain.value = gainSlider.value;

            // Route: Mic -> Gain -> Analyzer -> Output
            micSource.connect(gainNode);
            gainNode.connect(analyzer);
            analyzer.connect(audioCtx.destination);

            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            updateVisualizer();
        } catch (err) {
            alert("Mic access is required. Please ensure you are on HTTPS.");
        }
    });

    gainSlider.addEventListener('input', (e) => {
        if (gainNode) gainNode.gain.value = e.target.value;
    });

    function updateVisualizer() {
        const dataArray = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteFrequencyData(dataArray);
        const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
        bar.style.width = Math.min(average * 2.5, 100) + "%";
        animationId = requestAnimationFrame(updateVisualizer);
    }

    stopBtn.addEventListener('click', () => {
        if (audioCtx) audioCtx.close();
        cancelAnimationFrame(animationId);
        startBtn.style.display = 'block';
        stopBtn.style.display = 'none';
        bar.style.width = "0%";
    });
</script>

</body>
</html>
