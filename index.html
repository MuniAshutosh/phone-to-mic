<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Mic Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #007AFF;
            --danger: #FF3B30;
            --success: #4CD964;
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #1c1c1e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 360px;
        }
        h1 { font-size: 1.5rem; margin-top: 0; margin-bottom: 1.5rem; }
        
        /* Visualizer */
        #visualizer {
            width: 100%;
            height: 16px;
            background: #e5e5ea;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        #bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.05s ease; }

        /* Control Panels */
        .panel {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 15px;
            text-align: left;
        }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        label { font-size: 0.7rem; font-weight: 800; color: #8e8e93; text-transform: uppercase; }
        
        /* Main Button */
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        #startBtn { background: var(--primary); color: white; }
        #stopBtn { background: #fee; color: var(--danger); display: none; }
        
        /* QR & Social */
        .footer-section { margin-top: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #qrcode { padding: 10px; background: white; border-radius: 12px; }
        .gh-link {
            text-decoration: none;
            color: #333;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Pocket Mic</h1>
    
    <div id="visualizer"><div id="bar"></div></div>
    
    <div class="panel">
        <div class="label-row">
            <label>Live Output</label>
            <span id="echoStatus" style="font-size: 0.7rem; font-weight: bold;">OFF</span>
        </div>
        <input type="checkbox" id="echoToggle" checked style="transform: scale(1.2);">
        <span style="font-size: 0.85rem; margin-left: 8px;">Enable Speaker Stream</span>
    </div>

    <div class="panel">
        <label>Mic Sensitivity</label>
        <input type="range" id="gainSlider" min="0" max="2" step="0.1" value="1" style="width:100%; margin-top:10px;">
    </div>

    <button id="startBtn" class="btn">Start Session</button>
    <button id="stopBtn" class="btn">End Session</button>

    <div class="footer-section">
        <div id="qrcode"></div>
        <a id="ghLink" class="gh-link" target="_blank">
            <svg height="20" width="20" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            View Source on GitHub
        </a>
    </div>
</div>

<script>
    let audioCtx, micSource, analyzer, gainNode, animationId;

    // 1. Dynamic GitHub Link Detection
    const ghLink = document.getElementById('ghLink');
    // Extracts username/repo from GitHub Pages URL
    const currentUrl = window.location.href;
    if (currentUrl.includes('github.io')) {
        const parts = currentUrl.split('.');
        const user = parts[0].replace('https://', '');
        const repo = currentUrl.split('/')[3];
        ghLink.href = `https://github.com/${user}/${repo}`;
    } else {
        ghLink.style.display = 'none'; // Hide if not on GH Pages
    }

    // 2. QR Code Generation
    new QRCode(document.getElementById("qrcode"), {
        text: currentUrl,
        width: 100, height: 100
    });

    // 3. Audio Logic
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const echoToggle = document.getElementById('echoToggle');

    startBtn.addEventListener('click', async () => {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: false } 
            });

            micSource = audioCtx.createMediaStreamSource(stream);
            gainNode = audioCtx.createGain();
            analyzer = audioCtx.createAnalyser();
            
            micSource.connect(gainNode);
            gainNode.connect(analyzer);
            
            updateRouting();

            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            tick();
        } catch (err) {
            alert("Ensure you are using HTTPS and have granted mic permissions.");
        }
    });

    function updateRouting() {
        if (!gainNode) return;
        if (echoToggle.checked) {
            analyzer.connect(audioCtx.destination);
            document.getElementById('echoStatus').innerText = "ON";
            document.getElementById('echoStatus').style.color = "var(--success)";
        } else {
            analyzer.disconnect(audioCtx.destination);
            document.getElementById('echoStatus').innerText = "OFF";
            document.getElementById('echoStatus').style.color = "var(--danger)";
        }
    }

    echoToggle.addEventListener('change', updateRouting);
    document.getElementById('gainSlider').addEventListener('input', (e) => {
        if (gainNode) gainNode.gain.value = e.target.value;
    });

    function tick() {
        const data = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b) / data.length;
        document.getElementById('bar').style.width = Math.min(avg * 2.5, 100) + "%";
        animationId = requestAnimationFrame(tick);
    }

    stopBtn.addEventListener('click', () => {
        location.reload(); 
    });
</script>
</body>
</html>
